/* ---------- LÓGICA DE COMITÉS ---------- */
function carryOver(prev, nombre) {
  const fromAgenda = prev.agenda.filter((a) => !a.done).map((a) => {
    const { done, ...rest } = a;
    return { ...rest };
  });
  const fromNuevos = prev.nuevos.map((n) => ({
    cat: n.cat,
    text: n.text,
    ...(n.resp ? { resp: [n.resp] } : {}),
    nuevo: true,
  }));
  const agenda = [...fromAgenda, ...fromNuevos].map((a, i) => ({ ...a, id: i + 1 }));
  return { id: "c" + Date.now(), nombre, agenda, nuevos: [], release: null };
}

function buildSeed() {
  const junio = { id: "jun2026", nombre: "Junio 2026", agenda: JUNIO_AGENDA, nuevos: SEED_NUEVOS, release: JUNIO_RELEASE };
  const julio = carryOver(junio, "Julio 2026");
  julio.id = "jul2026";
  julio.agenda.push({ id: julio.agenda.length + 1, cat: "comercial", text: "Revisión de la integración con el proveedor para aceptación o rechazo de facturas de fiducias", resp: ["Ximena"] });
  return { categorias: SEED_CATS, activoId: "jul2026", comites: [junio, julio] };
}

function resolveCat(key, customCats) {
  if (CATS[key]) return CATS[key];
  const c = (customCats || []).find((x) => x.key === key);
  if (c) return { label: c.label, icon: Tag, color: c.color };
  return { label: key, icon: Tag, color: "bg-slate-100 text-slate-600 border-slate-200" };
}

function suggestNext(nombre) {
  const parts = (nombre || "").trim().split(/\s+/);
  if (parts.length === 2) {
    const i = MONTHS.findIndex((m) => m.toLowerCase() === parts[0].toLowerCase());
    const year = parseInt(parts[1], 10);
    if (i >= 0 && !isNaN(year)) {
      const ni = (i + 1) % 12;
      const ny = i === 11 ? year + 1 : year;
      return `${MONTHS[ni]} ${ny}`;
    }
  }
  return "";
}

function Badge({ children, className }) {
  return (
    <span className={`inline-flex items-center gap-1 text-xs font-medium px-2 py-0.5 rounded-full border ${className}`}>
      {children}
    </span>
  );
}

/* ================================================================
   CAPA DE DATOS — FIREBASE FIRESTORE
   ----------------------------------------------------------------
   Todo el estado vive en el documento comitesFE/main.
   - useComiteData() se suscribe con onSnapshot (tiempo real):
     si otra persona del comité cambia algo, se refleja aquí.
   - save() escribe el estado completo (los datos son pequeños,
     mucho menores al límite de 1 MB por documento).
   - Sin configuración o sin conexión → modo local con los datos
     semilla y un aviso (los cambios no se guardan).
   ================================================================ */
function useComiteData() {
  const [data, setData] = useState(null);
  // status: "connecting" | "online" | "local" | "error"
  const [status, setStatus] = useState(FIREBASE_READY && db ? "connecting" : "local");
  const seededRef = useRef(false);

  useEffect(() => {
    if (!FIREBASE_READY || !db) {
      setData(buildSeed());
      return;
    }
    const ref = db.collection(FS_COLLECTION).doc(FS_DOC);
    const unsub = ref.onSnapshot(
      (snap) => {
        if (snap.exists) {
          const raw = snap.data();
          // El estado se guarda serializado para preservar la estructura exacta
          const loaded = raw.json ? JSON.parse(raw.json) : raw;
          if (loaded && loaded.comites && loaded.comites.length) {
            setData(loaded);
            setStatus("online");
            return;
          }
        }
        // Primera vez: sembrar la base de datos
        if (!seededRef.current) {
          seededRef.current = true;
          const seed = buildSeed();
          ref.set({ json: JSON.stringify(seed), updatedAt: firebase.firestore.FieldValue.serverTimestamp() })
            .catch((e) => { console.error("Error sembrando datos:", e); setStatus("error"); setData(seed); });
        }
      },
      (err) => {
        console.error("Error de conexión con Firestore:", err);
        setStatus("error");
        setData((d) => d || buildSeed());
      }
    );
    return () => unsub();
  }, []);

  const save = async (next) => {
    setData(next); // actualización optimista: la UI responde al instante
    if (!FIREBASE_READY || !db) return;
    try {
      await db.collection(FS_COLLECTION).doc(FS_DOC).set({
        json: JSON.stringify(next),
        updatedAt: firebase.firestore.FieldValue.serverTimestamp(),
      });
      setStatus("online");
    } catch (e) {
      console.error("Error guardando en Firestore:", e);
      setStatus("error");
    }
  };

  return { data, save, status };
}

function ConnectionPill({ status }) {
  const map = {
    connecting: { icon: RefreshCw,  text: "Conectando…",              cls: "bg-white/10 text-blue-200 border-white/20", spin: true },
    online:     { icon: Cloud,      text: "Sincronizado con Firebase", cls: "bg-emerald-500/20 text-emerald-200 border-emerald-400/30" },
    local:      { icon: CloudOff,   text: "Modo local — configura Firebase", cls: "bg-yellow-500/20 text-yellow-100 border-yellow-400/30" },
    error:      { icon: CloudOff,   text: "Sin conexión — cambios no guardados", cls: "bg-rose-500/20 text-rose-200 border-rose-400/30" },
  };
  const s = map[status] || map.connecting;
  const Icon = s.icon;
  return (
    <span className={`inline-flex items-center gap-1.5 text-xs font-medium px-2.5 py-1 rounded-full border ${s.cls}`}>
      <Icon className={`w-3.5 h-3.5 ${s.spin ? "animate-spin" : ""}`} />
      {s.text}
    </span>
  );
}

/* ---------- AGENDA VIEW ---------- */
function AgendaView({ comite, customCats, onToggle, onToggleProceso }) {
  const [query, setQuery] = useState("");
  const [catFilter, setCatFilter] = useState("all");
  const [statusFilter, setStatusFilter] = useState("all");

  const agenda = comite.agenda;
  const doneCount = agenda.filter((a) => a.done).length;

  const chipCats = [
    ...Object.entries(CATS).map(([k, c]) => ({ k, label: c.label.split(" / ")[0] })),
    ...customCats.map((c) => ({ k: c.key, label: c.label })),
  ];

  const filtered = useMemo(() => {
    return agenda.filter((it) => {
      if (catFilter !== "all" && it.cat !== catFilter) return false;
      if (statusFilter === "done" && !it.done) return false;
      if (statusFilter !== "all" && statusFilter !== "done" && it.status !== statusFilter) return false;
      if (query.trim()) {
        const q = query.toLowerCase();
        const extra = ((it.resp || []).join(" ") + " " + (typeof it.done === "string" ? it.done : "")).toLowerCase();
        if (!it.text.toLowerCase().includes(q) && !extra.includes(q)) return false;
      }
      return true;
    });
  }, [agenda, query, catFilter, statusFilter]);

  const grouped = useMemo(() => {
    const g = {};
    filtered.forEach((it) => { (g[it.cat] = g[it.cat] || []).push(it); });
    return g;
  }, [filtered]);

  const keyOrder = [...Object.keys(CATS), ...customCats.map((c) => c.key)].filter((k) => grouped[k]);
  Object.keys(grouped).forEach((k) => { if (!keyOrder.includes(k)) keyOrder.push(k); });

  return (
    <div>
      <div className="flex items-center gap-3 mb-4 bg-emerald-50 border border-emerald-200 rounded-xl px-4 py-3">
        <CheckCircle2 className="w-5 h-5 text-emerald-600 shrink-0" />
        <div className="flex-1 min-w-0">
          <p className="text-sm text-emerald-800 font-medium">{doneCount} de {agenda.length} temas completados en {comite.nombre}</p>
          <div className="h-1.5 bg-emerald-100 rounded-full mt-1.5 overflow-hidden">
            <div className="h-full bg-emerald-500 rounded-full" style={{ width: `${agenda.length ? (doneCount / agenda.length) * 100 : 0}%` }} />
          </div>
        </div>
      </div>

      <div className="flex flex-col gap-3 mb-5">
        <div className="relative">
          <Search className="w-4 h-4 text-slate-400 absolute left-3 top-1/2 -translate-y-1/2" />
          <input
            value={query}
            onChange={(e) => setQuery(e.target.value)}
            placeholder="Buscar tema, responsable o HU…"
            className="w-full pl-9 pr-3 py-2 text-sm rounded-lg border border-slate-300 focus:outline-none focus:ring-2 focus:ring-blue-400 bg-white"
          />
        </div>
        <div className="flex flex-wrap gap-2">
          <FilterChip active={catFilter === "all"} onClick={() => setCatFilter("all")}>Todas las áreas</FilterChip>
          {chipCats.map((c) => (
            <FilterChip key={c.k} active={catFilter === c.k} onClick={() => setCatFilter(catFilter === c.k ? "all" : c.k)}>
              {c.label}
            </FilterChip>
          ))}
        </div>
        <div className="flex flex-wrap gap-2">
          <FilterChip active={statusFilter === "all"} onClick={() => setStatusFilter("all")} subtle>Cualquier estado</FilterChip>
          <FilterChip active={statusFilter === "done"} onClick={() => setStatusFilter(statusFilter === "done" ? "all" : "done")} subtle>Completado</FilterChip>
          {Object.entries(STATUS).map(([k, s]) => (
            <FilterChip key={k} active={statusFilter === k} onClick={() => setStatusFilter(statusFilter === k ? "all" : k)} subtle>
              {s.label}
            </FilterChip>
          ))}
        </div>
      </div>

      {filtered.length === 0 && (
        <p className="text-sm text-slate-500 py-8 text-center">No hay temas que coincidan con el filtro.</p>
      )}

      <div className="space-y-5">
        {keyOrder.map((k) => {
          const Cat = resolveCat(k, customCats);
          const Icon = Cat.icon;
          return (
            <div key={k} className="border border-slate-200 rounded-xl overflow-hidden bg-white">
              <div className={`flex items-center gap-2 px-4 py-2.5 border-b ${Cat.color}`}>
                <Icon className="w-4 h-4" />
                <h3 className="text-sm font-semibold">{Cat.label}</h3>
                <span className="ml-auto text-xs font-medium opacity-70">{grouped[k].length}</span>
              </div>
              <ul className="divide-y divide-slate-100">
                {grouped[k].map((it) => (
                  <li key={it.id} className={`flex gap-3 px-4 py-3 hover:bg-slate-50 ${it.done ? "bg-emerald-50/40 border-l-2 border-emerald-400" : ""}`}>
                    <div className="flex gap-1 mt-0.5 shrink-0">
                      <button
                        onClick={() => onToggle(it.id)}
                        className={`transition-colors ${it.done ? "text-emerald-500" : "text-slate-300 hover:text-emerald-500"}`}
                        title={it.done ? "Marcar como pendiente" : "Marcar como completado"}
                      >
                        <CheckCircle2 className="w-5 h-5" />
                      </button>
                      <button
                        onClick={() => onToggleProceso(it.id)}
                        className={`transition-colors ${it.status === "proceso" ? "text-sky-500" : "text-slate-300 hover:text-sky-500"}`}
                        title={it.status === "proceso" ? "Quitar 'En proceso'" : "Marcar 'En proceso'"}
                      >
                        <RefreshCw className="w-5 h-5" />
                      </button>
                    </div>
                    <span className="text-xs font-mono text-slate-400 mt-1 w-6 shrink-0">{String(it.id).padStart(2, "0")}</span>
                    <div className="min-w-0 flex-1">
                      <p className={`text-sm leading-snug ${it.done ? "text-slate-400 line-through" : "text-slate-700"}`}>{it.text}</p>
                      <div className="flex flex-wrap gap-1.5 mt-1.5">
                        {it.done && (
                          <Badge className="bg-emerald-100 text-emerald-700 border-emerald-200">
                            <CheckCircle2 className="w-3 h-3" />Completado{typeof it.done === "string" ? ` · ${it.done}` : ""}
                          </Badge>
                        )}
                        {it.tag && (
                          <Badge className="bg-yellow-100 text-yellow-800 border-yellow-200"><Clock className="w-3 h-3" />{it.tag}</Badge>
                        )}
                        {it.status && (() => {
                          const S = STATUS[it.status];
                          const SI = S.icon;
                          return <Badge className={S.color}><SI className="w-3 h-3" />{S.label}</Badge>;
                        })()}
                        {(it.resp || []).map((r) => (
                          <Badge key={r} className="bg-slate-100 text-slate-600 border-slate-200"><Users className="w-3 h-3" />{r}</Badge>
                        ))}
                      </div>
                    </div>
                  </li>
                ))}
              </ul>
            </div>
          );
        })}
      </div>
    </div>
  );
}

function FilterChip({ active, onClick, children, subtle }) {
  const base = "text-xs px-3 py-1 rounded-full border transition-colors cursor-pointer";
  const on = subtle ? "bg-slate-700 text-white border-slate-700" : "bg-blue-600 text-white border-blue-600";
  const off = "bg-white text-slate-600 border-slate-300 hover:border-slate-400";
  return <button onClick={onClick} className={`${base} ${active ? on : off}`}>{children}</button>;
}

/* ---------- NUEVOS TEMAS VIEW ---------- */
function NuevosView({ comite, customCats, onAdd, onRemove, onToggle, onCreateCat }) {
  const [text, setText] = useState("");
  const [cat, setCat] = useState("recepcion");
  const [resp, setResp] = useState("");
  const [newCatName, setNewCatName] = useState("");

  const items = comite.nuevos;

  const add = () => {
    if (!text.trim() || cat === "__new__") return;
    onAdd({
      id: Date.now(),
      text: text.trim(),
      cat,
      resp: resp.trim() || null,
      ts: new Date().toLocaleString("es-CO", { dateStyle: "short", timeStyle: "short" }),
    });
    setText("");
    setResp("");
  };

  const createCat = () => {
    const label = newCatName.trim();
    if (!label) return;
    const key = "cust_" + Date.now();
    const color = CAT_PALETTE[customCats.length % CAT_PALETTE.length];
    onCreateCat({ key, label, color });
    setCat(key);
    setNewCatName("");
  };

  return (
    <div className="space-y-5">
      <div className="border border-slate-200 rounded-xl bg-white p-4">
        <p className="flex items-center gap-1.5 text-sm font-semibold text-slate-800 mb-3">
          <PlusCircle className="w-4 h-4 text-blue-600" /> Registrar un tema nuevo en {comite.nombre}
        </p>
        <div className="space-y-3">
          <textarea
            value={text}
            onChange={(e) => setText(e.target.value)}
            onKeyDown={(e) => { if (e.key === "Enter" && (e.ctrlKey || e.metaKey)) add(); }}
            placeholder="Describe el tema que surgió en la reunión…"
            rows={2}
            className="w-full px-3 py-2 text-sm rounded-lg border border-slate-300 focus:outline-none focus:ring-2 focus:ring-blue-400 resize-y"
          />
          <div className="flex flex-col sm:flex-row gap-3">
            <select
              value={cat}
              onChange={(e) => setCat(e.target.value)}
              className="sm:w-64 px-3 py-2 text-sm rounded-lg border border-slate-300 bg-white focus:outline-none focus:ring-2 focus:ring-blue-400"
            >
              <optgroup label="Áreas del comité">
                {Object.entries(CATS).map(([k, c]) => (<option key={k} value={k}>{c.label}</option>))}
              </optgroup>
              {customCats.length > 0 && (
                <optgroup label="Categorías propias">
                  {customCats.map((c) => (<option key={c.key} value={c.key}>{c.label}</option>))}
                </optgroup>
              )}
              <option value="__new__">+ Crear nueva categoría…</option>
            </select>
            <input
              value={resp}
              onChange={(e) => setResp(e.target.value)}
              onKeyDown={(e) => { if (e.key === "Enter") add(); }}
              placeholder="Responsable (opcional)"
              className="flex-1 px-3 py-2 text-sm rounded-lg border border-slate-300 focus:outline-none focus:ring-2 focus:ring-blue-400"
            />
            <button
              onClick={add}
              disabled={!text.trim() || cat === "__new__"}
              className="flex items-center justify-center gap-1.5 px-4 py-2 text-sm font-medium rounded-lg bg-blue-600 text-white hover:bg-blue-700 disabled:opacity-40 disabled:cursor-not-allowed"
            >
              <Plus className="w-4 h-4" /> Agregar
            </button>
          </div>

          {cat === "__new__" && (
            <div className="flex flex-col sm:flex-row gap-3 bg-violet-50 border border-violet-200 rounded-lg p-3">
              <input
                value={newCatName}
                onChange={(e) => setNewCatName(e.target.value)}
                onKeyDown={(e) => { if (e.key === "Enter") createCat(); }}
                placeholder="Nombre de la nueva categoría"
                autoFocus
                className="flex-1 px-3 py-2 text-sm rounded-lg border border-violet-300 focus:outline-none focus:ring-2 focus:ring-violet-400 bg-white"
              />
              <button
                onClick={createCat}
                disabled={!newCatName.trim()}
                className="flex items-center justify-center gap-1.5 px-4 py-2 text-sm font-medium rounded-lg bg-violet-600 text-white hover:bg-violet-700 disabled:opacity-40 disabled:cursor-not-allowed"
              >
                <Tag className="w-4 h-4" /> Crear
              </button>
            </div>
          )}

          <p className="text-xs text-slate-400">Tip: Ctrl/Cmd + Enter para agregar rápido. Al cerrar el comité, estos temas pasan a la agenda del siguiente mes.</p>
        </div>
      </div>

      {items.length === 0 ? (
        <div className="text-center py-10 border border-dashed border-slate-300 rounded-xl">
          <PlusCircle className="w-8 h-8 text-slate-300 mx-auto mb-2" />
          <p className="text-sm text-slate-500">Aún no hay temas nuevos en {comite.nombre}.</p>

        <div className="border border-slate-200 rounded-xl overflow-hidden bg-white">

                  </button>

                  <div className="min-w-0 flex-1">
                    <p className={`text-sm leading-snug ${it.done ? "text-slate-400 line-through" : "text-slate-700"}`}>{it.text}</p>
                    <div className="flex flex-wrap items-center gap-1.5 mt-1.5">
                      {it.done && <Badge className="bg-emerald-100 text-emerald-700 border-emerald-200"><CheckCircle2 className="w-3 h-3" />Completado</Badge>}
                      <Badge className={Cat.color}><Icon className="w-3 h-3" />{Cat.label.split(" / ")[0]}</Badge>
                      {it.resp && <Badge className="bg-slate-100 text-slate-600 border-slate-200"><Users className="w-3 h-3" />{it.resp}</Badge>}
                      <span className="text-xs text-slate-400">{it.ts}</span>
                    </div>
                  </div>
                  <button onClick={() => onRemove(it.id)} className="text-slate-300 hover:text-rose-500 transition-colors self-start mt-0.5" title="Eliminar tema">
                    <Trash2 className="w-4 h-4" />
                  </button>
                </li>
              );
            })}
          </ul>
        </div>
      )}
    </div>
  );
}

          <>
            <p className="font-semibold mb-1">No se pudo conectar con Firestore — los cambios no se están guardando.</p>
            <p>Verifica las credenciales de <code className="font-mono bg-rose-100 px-1 rounded">firebaseConfig</code>, que Firestore esté habilitado y que las reglas de seguridad permitan leer y escribir. Revisa la consola del navegador (F12) para ver el detalle del error.</p>
          </>
        )}
      </div>
    </div>
  );
}

/* ---------- ROOT ---------- */
function App() {
  const { data, save, status } = useComiteData();
  const [viewId, setViewId] = useState(null);
  const [tab, setTab] = useState("agenda");
  const [creating, setCreating] = useState(false);
  const [newName, setNewName] = useState("");

  useEffect(() => {
    if (data && !viewId) {
      setViewId(data.activoId || data.comites[data.comites.length - 1].id);
    }
  }, [data, viewId]);

  const updateComite = (id, updater) => {
    save({ ...data, comites: data.comites.map((c) => (c.id === id ? updater(c) : c)) });
  };

  if (!data || !viewId) {
    return (
      <div className="min-h-screen bg-slate-100 flex flex-col items-center justify-center gap-2 text-sm text-slate-400">
        <RefreshCw className="w-6 h-6 animate-spin text-blue-400" />
        {status === "connecting" ? "Conectando con Firebase…" : "Cargando comités…"}
      </div>
    );
  }

  const comite = data.comites.find((c) => c.id === viewId) || data.comites[data.comites.length - 1];
  const customCats = data.categorias || [];
  const doneCount = comite.agenda.filter((a) => a.done).length;
  const huCount = comite.release ? Object.values(comite.release.modulos).reduce((a, m) => a + m.features.length, 0) : 0;

  // Acciones agenda
  const toggleAgenda = (itemId) => updateComite(comite.id, (c) => ({
    ...c, agenda: c.agenda.map((a) => (a.id === itemId ? { ...a, done: a.done ? false : true } : a)),
  }));
  const toggleProceso = (itemId) => updateComite(comite.id, (c) => ({
    ...c, agenda: c.agenda.map((a) => (a.id === itemId ? { ...a, status: a.status === "proceso" ? undefined : "proceso" } : a)),
  }));
  // Acciones nuevos
  const addNuevo = (item) => updateComite(comite.id, (c) => ({ ...c, nuevos: [...c.nuevos, item] }));
  const removeNuevo = (id) => updateComite(comite.id, (c) => ({ ...c, nuevos: c.nuevos.filter((n) => n.id !== id) }));
  const toggleNuevo = (id) => updateComite(comite.id, (c) => ({ ...c, nuevos: c.nuevos.map((n) => (n.id === id ? { ...n, done: !n.done } : n)) }));
  const createCat = (catObj) => save({ ...data, categorias: [...customCats, catObj] });

  // Crear siguiente comité
  const openCreate = () => {
    const last = data.comites[data.comites.length - 1];
    setNewName(suggestNext(last.nombre) || "");
    setCreating(true);
  };
  const confirmCreate = () => {
    const nombre = newName.trim();
    if (!nombre) return;
    const last = data.comites[data.comites.length - 1];
    const nuevo = carryOver(last, nombre);
    const next = { ...data, comites: [...data.comites, nuevo], activoId: nuevo.id };
    save(next);
    setViewId(nuevo.id);
    setCreating(false);
    setNewName("");
    setTab("agenda");
  };

  return (
    <div className="min-h-screen bg-slate-100 font-sans">
      <header className="bg-gradient-to-r from-slate-900 to-blue-900 text-white">
        <div className="max-w-4xl mx-auto px-5 py-6">
          <div className="flex flex-wrap items-center gap-2 mb-1">
            <div className="flex items-center gap-2 text-blue-300 text-xs font-semibold uppercase tracking-widest">
              <ListChecks className="w-4 h-4" /> Sinco · FE/RE
            </div>
            <div className="ml-auto"><ConnectionPill status={status} /></div>
          </div>
          <h1 className="text-2xl md:text-3xl font-bold">Comité Mensual de Facturación Electrónica</h1>

          {/* Selector de comité / historial */}
          <div className="flex flex-wrap items-center gap-2 mt-3">
            <History className="w-4 h-4 text-blue-300" />
            <span className="text-blue-200 text-sm">Comité:</span>
            <div className="relative">
              <select
                value={viewId}
                onChange={(e) => { setViewId(e.target.value); setTab("agenda"); }}
                className="appearance-none bg-white/10 border border-white/20 text-white text-sm font-medium rounded-lg pl-3 pr-8 py-1.5 focus:outline-none focus:ring-2 focus:ring-blue-400 cursor-pointer"
              >
                {data.comites.map((c) => (
                  <option key={c.id} value={c.id} className="text-slate-800">
                    {c.nombre}{c.id === data.activoId ? " (actual)" : ""}
                  </option>
                ))}
              </select>
              <ChevronDown className="w-4 h-4 absolute right-2 top-1/2 -translate-y-1/2 text-blue-200 pointer-events-none" />
            </div>
            <button
              onClick={openCreate}
              className="flex items-center gap-1.5 text-sm font-medium bg-blue-600 hover:bg-blue-500 rounded-lg px-3 py-1.5"
            >
              <CalendarPlus className="w-4 h-4" /> Cerrar mes y abrir siguiente
            </button>
          </div>

          {creating && (
            <div className="mt-3 bg-white/10 border border-white/20 rounded-xl p-3">
              <p className="text-xs text-blue-100 mb-2">
                Se creará un nuevo comité arrastrando los temas <strong>no completados</strong> y convirtiendo los <strong>temas nuevos</strong> en agenda. Los completados de "{data.comites[data.comites.length - 1].nombre}" no se arrastran.
              </p>
              <div className="flex flex-col sm:flex-row gap-2">
                <input
                  value={newName}
                  onChange={(e) => setNewName(e.target.value)}
                  onKeyDown={(e) => { if (e.key === "Enter") confirmCreate(); }}
                  placeholder="Nombre del comité (p. ej. Agosto 2026)"
                  autoFocus
                  className="flex-1 px-3 py-2 text-sm rounded-lg border border-white/30 bg-white text-slate-800 focus:outline-none focus:ring-2 focus:ring-blue-400"
                />
                <button onClick={confirmCreate} disabled={!newName.trim()} className="flex items-center justify-center gap-1.5 px-4 py-2 text-sm font-medium rounded-lg bg-emerald-500 hover:bg-emerald-400 disabled:opacity-40">
                  <CalendarPlus className="w-4 h-4" /> Crear
                </button>
                <button onClick={() => setCreating(false)} className="flex items-center justify-center gap-1.5 px-3 py-2 text-sm rounded-lg bg-white/10 hover:bg-white/20">
                  <X className="w-4 h-4" /> Cancelar
                </button>
              </div>
            </div>
          )}

          <div className="grid grid-cols-2 sm:grid-cols-4 gap-3 mt-5">
            <SummaryCard value={comite.agenda.length} label="Temas en agenda" icon={ListChecks} />
            <SummaryCard value={doneCount} label="Completados" icon={CheckCircle2} />
            <SummaryCard value={comite.nuevos.length} label="Temas nuevos" icon={PlusCircle} />
            <SummaryCard value={huCount} label="HU liberadas" icon={Sparkles} />
          </div>
        </div>
      </header>

      <SetupBanner status={status} />

      <div className="max-w-4xl mx-auto px-5 sticky top-0 z-10 mt-0">
        <div className="flex gap-1 -mt-3 bg-white rounded-xl shadow-sm border border-slate-200 p-1">
          <TabBtn active={tab === "agenda"} onClick={() => setTab("agenda")} icon={ListChecks}>Agenda</TabBtn>
          <TabBtn active={tab === "nuevos"} onClick={() => setTab("nuevos")} icon={PlusCircle}>Nuevos temas</TabBtn>
          <TabBtn active={tab === "release"} onClick={() => setTab("release")} icon={Sparkles}>Release{comite.release ? ` ${comite.release.version}` : ""}</TabBtn>
        </div>
      </div>

      <main className="max-w-4xl mx-auto px-5 py-6">
        {tab === "agenda" && <AgendaView comite={comite} customCats={customCats} onToggle={toggleAgenda} onToggleProceso={toggleProceso} />}
        {tab === "nuevos" && <NuevosView comite={comite} customCats={customCats} onAdd={addNuevo} onRemove={removeNuevo} onToggle={toggleNuevo} onCreateCat={createCat} />}
        {tab === "release" && <ReleaseView comite={comite} />}
      </main>

      <footer className="max-w-4xl mx-auto px-5 pb-8 text-center text-xs text-slate-400">
        Comité de Facturación Electrónica — FE/RE Sinco · {data.comites.length} comité(s) en el historial · Datos en Cloud Firestore
      </footer>
    </div>
  );
}

function SummaryCard({ value, label, icon: Icon }) {
  return (
    <div className="bg-white/10 backdrop-blur rounded-xl px-3 py-3 border border-white/10">
      <div className="flex items-center gap-1.5 text-blue-200 text-xs mb-1">
        <Icon className="w-3.5 h-3.5" />
        <span className="truncate">{label}</span>
      </div>
      <div className="text-2xl font-bold">{value}</div>
    </div>
  );
}

function TabBtn({ active, onClick, icon: Icon, children }) {
  return (
    <button
      onClick={onClick}
      className={`flex-1 flex items-center justify-center gap-1.5 text-sm font-medium rounded-lg px-3 py-2 transition-colors ${active ? "bg-blue-600 text-white" : "text-slate-600 hover:bg-slate-100"}`}
    >
      <Icon className="w-4 h-4" /> {children}
    </button>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
